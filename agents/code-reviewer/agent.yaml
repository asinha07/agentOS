{
  "name": "code-reviewer",
  "version": "0.2.0",
  "description": "Produces a code review checklist and reviews design artifacts.",
  "entrypoints": {"run": {"type": "builtin"}},
  "defaults": {"input": "Team todo app", "output": "review.md"},
  "tools": ["file_reader", "file_writer"],
  "model": {"provider": "openai", "model": "gpt-4.1"},
  "memory": {"type": "jsonl"},
  "permissions": {"filesystem": "limited"}
}

