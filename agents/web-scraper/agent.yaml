{
  "name": "web-scraper",
  "version": "0.2.0",
  "description": "Outlines a scraping plan (targets, selectors, storage).",
  "entrypoints": {"run": {"type": "builtin"}},
  "defaults": {"input": "docs site", "output": "scraping_plan.md"},
  "tools": ["http_client", "file_writer"],
  "model": {"provider": "openai", "model": "gpt-4.1"},
  "memory": {"type": "jsonl"},
  "permissions": {"internet": true, "filesystem": "limited"}
}

