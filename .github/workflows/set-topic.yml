name: Set AgentOS Topic

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  set-topic:
    runs-on: ubuntu-latest
    steps:
      - name: Set repository topics
        env:
          GH_ADMIN_PAT: ${{ secrets.GH_ADMIN_PAT }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$GH_ADMIN_PAT" ]; then
            echo "GH_ADMIN_PAT is not set; skipping topic update."; exit 0;
          fi
          echo "Setting topics to include 'agentos-agent' for $REPO"
          curl -s -X PUT \
            -H "Authorization: Bearer $GH_ADMIN_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/$REPO/topics \
            -d '{"names": ["agentos-agent"]}'

