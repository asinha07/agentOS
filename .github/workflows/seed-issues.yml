name: Seed Issues

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Create issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const issues = JSON.parse(fs.readFileSync(path.join(process.cwd(), 'docs/seed_issues.json'), 'utf8'));
            // Fetch existing issue titles to avoid duplicates
            const all = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100
            });
            const titles = new Set(all.map(i => i.title));
            for (const it of issues) {
              if (titles.has(it.title)) {
                core.info(`Skipping existing issue: ${it.title}`);
                continue;
              }
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: it.title,
                body: it.body,
                labels: it.labels || []
              });
              core.info(`Created: ${it.title}`);
            }

