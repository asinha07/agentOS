name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tidy_guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - name: Ensure modules are tidy
        run: |
          go mod tidy
          if ! git diff --quiet go.mod go.sum; then
            echo "[tidy_guard] go.mod/go.sum changed after 'go mod tidy'. Please run 'go mod tidy' locally and commit changes.";
          fi

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ '1.21.x', '1.22.x' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: Tidy modules
        run: |
          go mod tidy
          go mod download

      - name: Build CLI
        run: go build -v ./cmd/agent

      - name: Vet packages
        run: go vet ./...

      - name: Build all packages
        run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'

      - name: Tidy modules
        run: |
          go mod tidy
          go mod download

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
